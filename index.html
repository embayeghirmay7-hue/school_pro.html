 <!DOCTYPE html>
<html lang="ti">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEPM ACADEMY - Multiplayer</title>
    <style>
        :root { --gold: #D4AF37; --dark: #111; --green: #2ecc71; --blue: #3498db; }
        body { font-family: 'Arial', sans-serif; background: #f0f2f5; text-align: center; margin: 0; padding: 10px; }
        .card { background: white; max-width: 600px; margin: 10px auto; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 10px solid var(--gold); overflow: hidden; position: relative; }
        
        /* Player Selection Screen */
        #player-screen { padding: 40px 20px; }
        .player-list { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .p-btn { padding: 20px; border: none; border-radius: 20px; font-size: 20px; font-weight: bold; cursor: pointer; color: white; transition: 0.3s; }
        
        /* Game Screen */
        #game-screen { display: none; }
        .menu-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; padding: 15px; }
        .menu-grid button { padding: 12px 5px; border: 2px solid #eee; border-radius: 12px; cursor: pointer; font-weight: bold; background: white; font-size: 11px; }
        .menu-grid button.active { background: var(--gold); color: white; border-color: var(--gold); }
        .black-box { background: var(--dark); color: white; margin: 15px; padding: 30px 10px; border-radius: 25px; min-height: 250px; display: flex; flex-direction: column; justify-content: center; align-items: center; border: 5px solid transparent; }
        #qMain { font-size: 32px; font-weight: bold; line-height: 1.4; }
        input { width: 85%; padding: 18px; font-size: 22px; border-radius: 15px; border: 3px solid #ddd; text-align: center; outline: none; }
        .btn-check { background: var(--gold); color: white; padding: 18px; border: none; border-radius: 50px; font-size: 22px; cursor: pointer; width: 90%; font-weight: bold; margin: 15px 0; }
        
        .status-bar { display: flex; justify-content: space-around; padding: 15px; font-weight: bold; color: var(--gold); background: #f9f9f9; }
        .back-btn { position: absolute; top: 10px; left: 10px; cursor: pointer; font-size: 12px; background: #eee; padding: 5px 10px; border-radius: 5px; }
    </style>
</head>
<body>

<div class="card">
    <div id="player-screen">
        <h1 style="color: var(--gold);">👨‍👩‍👧‍👦 WHO IS PLAYING?</h1>
        <p>Select your name to start</p>
        <div class="player-list" id="playerButtons"></div>
    </div>

    <div id="game-screen">
        <div class="back-btn" onclick="showPlayers()">⬅️ Switch Player</div>
        <h1 style="color: var(--gold); margin-top: 30px;">✨ HEPM ACADEMY ✨</h1>
        <div id="currentPlayerDisplay" style="font-size: 24px; font-weight: bold; margin-bottom: 10px;"></div>

        <div class="menu-grid">
            <button id="m-math" onclick="setMode('math')">🔢 MATH</button>
            <button id="m-ti" onclick="setMode('ti')">🇪🇷 ትግርኛ</button>
            <button id="m-en" onclick="setMode('en')">🇬🇧 ENGLISH</button>
            <button id="m-de" onclick="setMode('de')">🇩🇪 DEUTSCH</button>
        </div>

        <div id="displayBox" class="black-box" onclick="speakCurrent()">
            <div id="qHint" style="font-size: 80px;">🐾</div>
            <div id="qMain">---</div>
            <div id="correctionText" style="color: #e74c3c; display:none; margin-top:10px;">TYPE: <span id="correctWord"></span></div>
        </div>

        <input type="text" id="ansInput" placeholder="Write answer..." autocomplete="off">
        <button class="btn-check" onclick="check()">SUBMIT / መርምር</button>
        <div id="fb" style="height: 40px; font-weight: bold;"></div>

        <div class="status-bar">
            <div>⭐ Score: <span id="scoreVal">0</span></div>
            <div>🏆 Level: <span id="levelVal">1</span></div>
        </div>
    </div>
</div>

<script>
    // ቆልዑን ስኮርን (Scores stay saved during the session)
    const players = [
        {id: 0, n: "HERMELA", c: "#ff69b4", score: 0, level: 1},
        {id: 1, n: "ERKABEL", c: "#3498db", score: 0, level: 1},
        {id: 2, n: "PEGGY", c: "#e67e22", score: 0, level: 1},
        {id: 3, n: "MARANATA", c: "#9b59b6", score: 0, level: 1},
        {id: 4, n: "GUEST", c: "#7f8c8d", score: 0, level: 1}
    ];

    let activePlayer = null;
    let currentMode = 'en', currentFullAns, currentSpeak, needsCorrection = false;

    // Load Player Buttons
    const pContainer = document.getElementById('playerButtons');
    players.forEach(p => {
        let btn = document.createElement('button');
        btn.className = 'p-btn';
        btn.style.backgroundColor = p.c;
        btn.innerText = p.n;
        btn.onclick = () => startAs(p.id);
        pContainer.appendChild(btn);
    });

    function startAs(id) {
        activePlayer = players[id];
        document.getElementById('player-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'block';
        updateStats();
        next();
    }

    function showPlayers() {
        document.getElementById('player-screen').style.display = 'block';
        document.getElementById('game-screen').style.display = 'none';
    }

    function updateStats() {
        document.getElementById('currentPlayerDisplay').innerText = activePlayer.n;
        document.getElementById('currentPlayerDisplay').style.color = activePlayer.c;
        document.getElementById('scoreVal').innerText = activePlayer.score;
        document.getElementById('levelVal').innerText = activePlayer.level;
    }

    // --- Same Game Logic with Multiplayer Saving ---
    function setMode(m) { currentMode = m; needsCorrection = false; next(); }

    function next() {
        if (needsCorrection) return;
        document.getElementById('ansInput').value = "";
        document.getElementById('fb').innerText = "";
        document.getElementById('correctionText').style.display = "none";
        
        if (currentMode === 'math') {
            let n1 = Math.floor(Math.random()*10 * activePlayer.level), n2 = Math.floor(Math.random()*10);
            currentFullAns = (n1 + n2).toString();
            document.getElementById('qHint').innerText = "🔢";
            document.getElementById('qMain').innerText = `${n1} + ${n2} = ?`;
        } else {
            // Simplified Database for demo
            let wordList = { en: ["lion", "apple", "school"], ti: ["ገዛ", "ከተማ", "ትምህርቲ"], de: ["haus", "apfel", "auto"] };
            let words = wordList[currentMode];
            currentFullAns = words[Math.floor(Math.random()*words.length)];
            document.getElementById('qHint').innerText = "📖";
            document.getElementById('qMain').innerText = currentFullAns[0] + "___";
        }
    }

    function check() {
        let val = document.getElementById('ansInput').value.trim().toLowerCase();
        if (val === currentFullAns.toLowerCase()) {
            if (!needsCorrection) activePlayer.score += 10;
            if (activePlayer.score % 100 === 0 && activePlayer.score > 0) activePlayer.level++;
            updateStats();
            needsCorrection = false;
            document.getElementById('fb').innerHTML = "✅ VERY GOOD!";
            setTimeout(next, 1200);
        } else {
            document.getElementById('fb').innerHTML = "❌ Try again!";
            document.getElementById('correctionText').style.display = "block";
            document.getElementById('correctWord').innerText = currentFullAns.toUpperCase();
            needsCorrection = true;
        }
    }

    function speakCurrent() { /* TTS Logic here */ }
</script>
</body>
</html>
