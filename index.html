 <!DOCTYPE html>
<html lang="ti">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEPM ACADEMY - Mega Version</title>
    <style>
        :root { --gold: #D4AF37; --dark: #111; --red: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; text-align: center; margin: 0; padding: 10px; }
        .card { background: white; max-width: 550px; margin: 10px auto; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); border-top: 10px solid var(--gold); overflow: hidden; padding-bottom: 25px; min-height: 550px; position: relative; }
        
        #player-screen { padding: 40px 20px; }
        .p-btn { width: 90%; padding: 18px; margin: 12px auto; border: none; border-radius: 15px; font-size: 22px; font-weight: bold; color: white; cursor: pointer; display: block; transition: 0.3s; }
        
        #game-screen { display: none; }
        .player-header { font-size: 28px; font-weight: 900; padding: 15px; letter-spacing: 2px; }
        .tabs { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; padding: 0 15px 15px; }
        .tab { padding: 12px 5px; border: 2px solid #eee; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 11px; background: #fff; }
        .tab.active { background: var(--gold); color: white; border-color: var(--gold); }

        .black-book { background: var(--dark); color: white; margin: 15px; padding: 30px 10px; border-radius: 20px; min-height: 280px; display: flex; flex-direction: column; justify-content: center; align-items: center; border: 4px solid #333; position: relative; }
        #qHint { font-size: 80px; margin-bottom: 10px; cursor: pointer; }
        #qMain { font-size: 32px; font-weight: bold; line-height: 1.4; color: #fff; padding: 0 10px; }
        
        #correction-box { margin-top: 15px; display: none; }
        .cor-label { color: var(--red); font-size: 18px; font-weight: 900; }
        .cor-word { color: var(--red); font-size: 32px; font-weight: 900; text-decoration: underline; }

        input { width: 85%; padding: 18px; font-size: 26px; border-radius: 15px; border: 3px solid #ddd; text-align: center; margin-top: 15px; outline: none; }
        .btn-check { background: var(--gold); color: white; padding: 20px; border: none; border-radius: 50px; font-size: 22px; width: 85%; font-weight: bold; margin-top: 20px; cursor: pointer; }
        
        .footer-stats { display: flex; justify-content: space-around; margin-top: 25px; font-weight: bold; color: #777; font-size: 18px; }
        .music-btn { position: absolute; top: 15px; right: 15px; background: #fff; border-radius: 50%; padding: 8px; cursor: pointer; font-size: 20px; z-index: 10; }
    </style>
</head>
<body>

<audio id="bgMusic" loop><source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" type="audio/mpeg"></audio>
<audio id="correctSound"><source src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3" type="audio/mpeg"></audio>
<audio id="wrongSound"><source src="https://assets.mixkit.co/active_storage/sfx/2003/2003-preview.mp3" type="audio/mpeg"></audio>

<div class="card">
    <div id="player-screen">
        <h1 style="color: var(--gold);">✨ HEPM ACADEMY ✨</h1>
        <p>SELECT PLAYER / ስም ምርገጽ</p>
        <div id="pButtons"></div>
    </div>

    <div id="game-screen">
        <div class="music-btn" onclick="toggleMusic()">🎵</div>
        <div class="player-header" id="activePName">PLAYER</div>
        <div class="tabs">
            <div class="tab" id="t-math" onclick="setMode('math')">🔢 MATH</div>
            <div class="tab" id="t-ti" onclick="setMode('ti')">🇪🇷 ትግርኛ</div>
            <div class="tab active" id="t-en" onclick="setMode('en')">🇬🇧 ENGLISH</div>
            <div class="tab" id="t-de" onclick="setMode('de')">🇩🇪 DEUTSCH</div>
        </div>

        <div class="black-book" onclick="speakText()">
            <div id="qHint">🦁</div>
            <div id="qMain">---</div>
            <div id="correction-box">
                <span class="cor-label">TYPE: </span>
                <span class="cor-word" id="correctWord"></span>
            </div>
            <div style="font-size: 10px; color: var(--gold); margin-top: 15px; opacity: 0.6;">🔈 CLICK TO HEAR / ስማዕ</div>
        </div>

        <input type="text" id="ansInput" placeholder="Answer..." autocomplete="off">
        <button class="btn-check" onclick="checkAns()">CHECK / መርምር</button>

        <div class="footer-stats">
            <div>⭐ Score: <span id="sVal">0</span></div>
            <div>🏆 Level: <span id="lVal">1</span></div>
        </div>
    </div>
</div>

<script>
    const players = [
        {name: "HERMELA", color: "#ff69b4", score: 0, level: 1},
        {name: "ERKABEL", color: "#3498db", score: 0, level: 1},
        {name: "PEGGY", color: "#e67e22", score: 0, level: 1},
        {name: "MARANATA", color: "#9b59b6", score: 0, level: 1}
    ];

    let activeP, mode = 'en', currentAns, currentFull, needsCorrection = false;

    // 🚀 MEGA DATABASE - ሰፊሕ መዝገበ ቃላት
    const database = {
        en: [
            {q:"🦁", a:"LION", s:"THE LION IS KING"}, {q:"🐘", a:"ELEPHANT", s:"THE ELEPHANT IS BIG"},
            {q:"🦒", a:"GIRAFFE", s:"THE GIRAFFE IS TALL"}, {q:"🍎", a:"APPLE", s:"I EAT AN APPLE"},
            {q:"🍌", a:"BANANA", s:"THE BANANA IS YELLOW"}, {q:"🚗", a:"CAR", s:"MY CAR IS FAST"},
            {q:"🚲", a:"BICYCLE", s:"I RIDE MY BICYCLE"}, {q:"🚁", a:"HELICOPTER", s:"THE HELICOPTER FLIES"},
            {q:"🏫", a:"SCHOOL", s:"I LOVE MY SCHOOL"}, {q:"🏠", a:"HOUSE", s:"THIS IS MY HOUSE"},
            {q:"🍕", a:"PIZZA", s:"I LIKE PIZZA"}, {q:"⚽", a:"BALL", s:"I PLAY WITH A BALL"},
            {q:"🐱", a:"CAT", s:"THE CAT IS CUTE"}, {q:"🐶", a:"DOG", s:"THE DOG IS LOYAL"},
            {q:"🦷", a:"TOOTH", s:"BRUSH YOUR TEETH"}, {q:"🥛", a:"MILK", s:"I DRINK MILK"},
            {q:"🌞", a:"SUN", s:"THE SUN IS HOT"}, {q:"🌙", a:"MOON", s:"THE MOON IS WHITE"},
            {q:"🐟", a:"FISH", s:"THE FISH SWIMS"}, {q:"🦅", a:"EAGLE", s:"THE EAGLE FLIES HIGH"}
        ],
        de: [
            {q:"🚗", a:"AUTO", s:"DAS AUTO IST SCHNELL"}, {q:"🏠", a:"HAUS", s:"DAS IST MEIN HAUS"},
            {q:"🍎", a:"APFEL", s:"ICH ESSE EINEN APFEL"}, {q:"🐶", a:"HUND", s:"DER HUND IST TREU"},
            {q:"🐱", a:"KATZE", s:"DIE KATZE IST KLEIN"}, {q:"🍌", a:"BANANE", s:"DIE BANANE IST GELB"},
            {q:"🌞", a:"SONNE", s:"DIE SONNE SCHEINT"}, {q:"🎒", a:"TASCHE", s:"MEINE TASCHE IST BLAU"},
            {q:"🥛", a:"MILCH", s:"ICH TRINKE MILCH"}, {q:"🚲", a:"FAHRRAD", s:"ICH FAHRE FAHRRAD"}
        ],
        ti: [
            {q:"🦁", a:"ኣንበሳ", s:"ኣንበሳ ንጉስ እዩ"}, {q:"🏠", a:"ገዛ", s:"እዚ ገዛይ እዩ"},
            {q:"🌞", a:"ጸሓይ", s:"ጸሓይ ትበርቅ ኣላ"}, {q:"🏫", a:"ትምህርቲ", s:"ናብ ትምህርቲ እኸይድ"},
            {q:"🚗", a:"መኪና", s:"መኪና ትጎይይ ኣላ"}, {q:"🍎", a:"ፖማ", s:"ፖማ እበልዕ ኣለኹ"},
            {q:"🐱", a:"ድሙ", s:"እዛ ድሙ ንእሽተይ እያ"}, {q:"🐶", a:"ከልቢ", s:"እቲ ከልቢ ይጮኽ ኣሎ"}
        ]
    };

    const btnContainer = document.getElementById('pButtons');
    players.forEach((p, i) => {
        let b = document.createElement('button');
        b.className = 'p-btn'; b.style.backgroundColor = p.color;
        b.innerText = p.name; b.onclick = () => { activeP = p; startGame(); };
        btnContainer.appendChild(b);
    });

    function startGame() {
        document.getElementById('player-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'block';
        document.getElementById('activePName').innerText = activeP.name;
        document.getElementById('activePName').style.color = activeP.color;
        let m = document.getElementById('bgMusic');
        m.volume = 0.15; m.play().catch(() => {});
        updateStats();
        setMode('en');
    }

    function toggleMusic() {
        let m = document.getElementById('bgMusic');
        m.paused ? m.play() : m.pause();
    }

    function setMode(m) {
        mode = m;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('t-' + m).classList.add('active');
        next();
    }

    function next() {
        document.getElementById('ansInput').value = '';
        document.getElementById('correction-box').style.display = 'none';
        needsCorrection = false;

        if (mode === 'math') {
            let n1 = Math.floor(Math.random() * 10 * activeP.level), n2 = Math.floor(Math.random() * 10);
            currentAns = (n1 + n2).toString();
            currentFull = currentAns;
            document.getElementById('qHint').innerText = "🔢";
            document.getElementById('qMain').innerText = `${n1} + ${n2} = ?`;
        } else {
            let list = database[mode] || database['en'];
            let item = list[Math.floor(Math.random() * list.length)];
            currentAns = (activeP.level === 1) ? item.a : item.s;
            currentFull = currentAns;
            document.getElementById('qHint').innerText = item.q;
            document.getElementById('qMain').innerText = (activeP.level === 1) ? item.a[0] + "_".repeat(item.a.length-1) : item.s.split(" ").slice(0,-1).join(" ") + " ___";
        }
    }

    function checkAns() {
        let val = document.getElementById('ansInput').value.trim().toUpperCase();
        if (val === currentAns.toUpperCase()) {
            if (!needsCorrection) {
                activeP.score += 10;
                document.getElementById('correctSound').play();
            }
            if (activeP.score > 0 && activeP.score % 100 === 0 && !needsCorrection) activeP.level++;
            updateStats();
            setTimeout(next, 500);
        } else {
            document.getElementById('wrongSound').play();
            document.getElementById('correction-box').style.display = 'block';
            document.getElementById('correctWord').innerText = currentAns;
            needsCorrection = true;
        }
    }

    function speakText() {
        if (mode === 'ti') return;
        window.speechSynthesis.cancel();
        let msg = new SpeechSynthesisUtterance(currentFull);
        msg.lang = (mode === 'de') ? 'de-DE' : 'en-US';
        window.speechSynthesis.speak(msg);
    }

    function updateStats() {
        document.getElementById('sVal').innerText = activeP.score;
        document.getElementById('lVal').innerText = activeP.level;
    }
</script>
</body>
</html>
