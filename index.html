 <!DOCTYPE html>
<html lang="ti">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEPM ACADEMY - Learning is Fun!</title>
    <style>
        :root { --primary: #2c3e50; --secondary: #27ae60; --accent: #e67e22; --bg: #f0f3f5; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 15px; text-align: center; }
        .main-card { background: white; max-width: 550px; margin: 20px auto; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.15); overflow: hidden; border-top: 10px solid var(--secondary); }
        .header { padding: 25px; background: white; }
        h1 { color: var(--primary); margin: 0; font-size: 30px; letter-spacing: 3px; font-weight: 900; }
        .kids-line { color: #95a5a6; font-size: 15px; margin-top: 8px; font-weight: bold; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        
        .question-zone { background: var(--primary); color: white; padding: 35px 20px; margin: 20px; border-radius: 20px; }
        #qText { font-size: 36px; font-weight: bold; display: block; margin-bottom: 10px; }
        #qTrans { font-size: 18px; color: #bdc3c7; line-height: 1.5; }
        
        input { width: 70%; padding: 18px; font-size: 26px; border-radius: 15px; border: 3px solid #dfe6e9; text-align: center; outline: none; margin-bottom: 20px; transition: 0.3s; }
        input:focus { border-color: var(--secondary); box-shadow: 0 0 10px rgba(39, 174, 96, 0.2); }
        
        .btn-check { background: var(--secondary); color: white; padding: 18px 50px; border: none; border-radius: 50px; font-size: 22px; cursor: pointer; width: 85%; font-weight: bold; box-shadow: 0 5px 0 #219150; transition: 0.2s; }
        .btn-check:active { transform: translateY(4px); box-shadow: none; }
        
        #feedback { height: 45px; margin-top: 20px; font-size: 22px; font-weight: bold; }
        .score-box { font-size: 24px; color: var(--accent); margin-bottom: 20px; font-weight: bold; }

        /* Vocabulary Table */
        .dict-section { background: #fdfdfd; padding: 25px; border-top: 2px solid #eee; text-align: left; }
        .dict-section h3 { margin-top: 0; color: var(--primary); font-size: 18px; border-left: 5px solid var(--accent); padding-left: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #f8f9fa; color: #7f8c8d; text-align: left; padding: 10px; font-size: 13px; text-transform: uppercase; }
        td { padding: 12px 10px; border-bottom: 1px solid #eee; font-size: 15px; }
        .lang-label { font-weight: bold; color: var(--primary); }
    </style>
</head>
<body>

<div class="main-card">
    <div class="header">
        <h1>🏫 HEPM ACADEMY</h1>
        <div class="kids-line">HERMELA • ERKABEL • PEGGY • MARANATA</div>
    </div>

    <div class="question-zone">
        <div id="qText">...</div>
        <div id="qTrans">...</div>
    </div>

    <input type="number" id="ansInput" placeholder="መልሲ / Answer">
    <br>
    <button class="btn-check" onclick="checkAnswer()">CHECK / መርምር 🚀</button>

    <div id="feedback"></div>
    <div class="score-box">⭐ Score: <span id="scoreVal">0</span></div>

    <div class="dict-section">
        <h3>📖 Dictionary (ትግርኛ - EN - DE)</h3>
        <table>
            <tr><th>Tigrinya</th><th>English</th><th>German</th></tr>
            <tr><td class="lang-label">ደሚርካ</td><td>Plus (+)</td><td>Plus</td></tr>
            <tr><td class="lang-label">ቀኒስካ</td><td>Minus (-)</td><td>Minus</td></tr>
            <tr><td class="lang-label">ኣባዚሕካ</td><td>Times (x)</td><td>Mal</td></tr>
            <tr><td class="lang-label">ትኽክል</td><td>Correct</td><td>Richtig</td></tr>
        </table>
    </div>
</div>

<script>
    let n1, n2, correctAns, score = 0;
    const kids = ["Hermela", "Erkabel", "Peggy", "Maranata"];

    function nextQuestion() {
        let name = kids[Math.floor(Math.random() * kids.length)];
        n1 = Math.floor(Math.random() * 12) + 1;
        n2 = Math.floor(Math.random() * 10) + 1;
        let mode = Math.random();

        if (mode < 0.4) { // Addition
            correctAns = n1 + n2;
            document.getElementById('qText').innerText = `${n1} + ${n2} = ?`;
            document.getElementById('qTrans').innerText = `${name}: ${n1} ደሚርካ ${n2} ይኸውን... \n (${n1} plus ${n2})`;
        } else if (mode < 0.7) { // Subtraction
            let big = Math.max(n1, n2); let small = Math.min(n1, n2);
            correctAns = big - small;
            document.getElementById('qText').innerText = `${big} - ${small} = ?`;
            document.getElementById('qTrans').innerText = `${name}: ካብ ${big} ተቀኒሱ ${small} ይኸውን... \n (${big} minus ${small})`;
        } else { // Multiplication
            correctAns = n1 * n2;
            document.getElementById('qText').innerText = `${n1} x ${n2} = ?`;
            document.getElementById('qTrans').innerText = `${name}: ${n1} ኣባዚሕካ ${n2} ይኸውን... \n (${n1} mal ${n2})`;
        }
        document.getElementById('ansInput').value = "";
        document.getElementById('ansInput').focus();
    }

    function checkAnswer() {
        let userAns = parseInt(document.getElementById('ansInput').value);
        let fb = document.getElementById('feedback');
        
        if (userAns === correctAns) {
            fb.innerText = "🌟 Excellent! / ብርትዕ! / Sehr gut!";
            fb.style.color = "#27ae60";
            score += 10;
            document.getElementById('scoreVal').innerText = score;
            setTimeout(nextQuestion, 1500);
        } else {
            fb.innerText = "❌ Try again / እንደገና / Versuchs nochmal";
            fb.style.color = "#e74c3c";
        }
    }

    // Start on load
    nextQuestion();
</script>

</body>
</html>
