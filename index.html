 <!DOCTYPE html>
<html lang="ti">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEPM SCHOOL - FINAL VERSION</title>
    <style>
        :root { --gold: #FFD700; --dark: #2c3e50; --pink: #ff4081; --blue: #00bcd4; --green: #4caf50; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f9ff; text-align: center; margin: 0; padding: 10px; }
        .card { background: white; max-width: 450px; margin: auto; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); padding: 20px; min-height: 85vh; border: 5px solid #fff; }
        .p-row { border: 2px solid #f0f0f0; border-radius: 20px; margin: 10px 0; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; background: white; transition: 0.2s; }
        .p-photo { width: 55px; height: 55px; border-radius: 50%; border: 3px solid #eee; object-fit: cover; }
        .score-box { color: white; padding: 6px 18px; border-radius: 20px; font-weight: bold; font-size: 16px; }
        #game-view, #setup-view { display: none; }
        .black-book { background: var(--dark); color: white; padding: 40px 20px; border-radius: 25px; margin: 20px 0; border-bottom: 8px solid #1a252f; }
        .mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
        .mode-btn { padding: 25px 10px; border-radius: 20px; border: 2px solid #eee; cursor: pointer; font-weight: bold; background: #fff; }
        input { width: 80%; padding: 15px; font-size: 22px; border-radius: 15px; border: 3px solid #eee; margin: 15px 0; text-align: center; }
        .btn { background: var(--green); color: white; padding: 20px; border: none; border-radius: 15px; width: 95%; font-size: 22px; cursor: pointer; font-weight: bold; box-shadow: 0 5px 0 #388e3c; }
    </style>
</head>
<body>

<div class="card">
    <div id="dashboard-view">
        <h1 style="color: var(--dark);">🏫 HEPM SCHOOL</h1>
        <div id="players-list">Loading Students...</div>
        <button onclick="fetchScores()" style="margin-top:20px; padding:10px; border-radius:10px; cursor:pointer;">🔄 Refresh</button>
    </div>

    <div id="setup-view">
        <button onclick="location.reload()" style="float:left; background:none; border:none; font-size:25px;">🏠</button>
        <h2 style="color: var(--dark);">ትምህርቲ ምረጽ</h2>
        <div class="mode-grid">
            <div class="mode-btn" onclick="startGame('math')" style="color: #e91e63;">🔢 MATH (1-100)</div>
            <div class="mode-btn" onclick="startGame('english')" style="color: #2196f3;">🇬🇧 ENGLISH</div>
            <div class="mode-btn" onclick="startGame('tigrinya')" style="color: #ff9800;">🇪🇷 ትግርኛ</div>
            <div class="mode-btn" onclick="startGame('german')" style="color: #673ab7;">🇩🇪 GERMAN</div>
            <div class="mode-btn" onclick="startGame('shopping')" style="grid-column: span 2; background: #f1f8e9; color: #4caf50;">🛒 ዕዳጋን ገንዘብን</div>
        </div>
    </div>

    <div id="game-view">
        <div style="display:flex; justify-content: space-between; align-items: center;">
            <button onclick="showSetup()" style="background:none; border:none; font-size:25px;">⬅️</button>
            <div style="font-weight:bold; color:var(--gold); font-size: 26px;">⭐ <span id="sVal">0</span></div>
        </div>
        <h2 id="activePName"></h2>
        <div class="black-book">
            <div id="qHint" style="font-size: 60px;"></div>
            <div id="qMain" style="font-size: 22px; margin-top: 15px; font-weight: bold;"></div>
        </div>
        <input type="text" id="ansInput" placeholder="መልሲ ኣብዚ ጸሓፍ...">
        <button class="btn" onclick="checkAns()">መልሲ ኣረጋግጽ</button>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw1rDVmkG3hITa_q-E8OQWbadTNiEN-PpsNBvho2zP7brA8cxYyZWeLa30lf7YAoC2OZQ/exec"; 
    
    let activeP, currentAns, currentMode, startTime;

    const playersConfig = [
        {name: "HERMELA", img: "https://www.w3schools.com/w3images/avatar6.png"},
        {name: "ERKABEL", img: "https://www.w3schools.com/w3images/avatar2.png"},
        {name: "PEGGY", img: "https://www.w3schools.com/w3images/avatar5.png"},
        {name: "MARANATA", img: "https://www.w3schools.com/w3images/avatar3.png"}
    ];

    const questions = {
        math: [
            {q:"2 * 8", a:"16", h:"🔢"}, {q:"3 * 9", a:"27", h:"🔢"}, {q:"4 * 7", a:"28", h:"🔢"}, {q:"5 * 6", a:"30", h:"🔢"}, {q:"6 * 6", a:"36", h:"🔢"}, {q:"7 * 7", a:"49", h:"🔢"}, {q:"8 * 8", a:"64", h:"🔢"}, {q:"9 * 9", a:"81", h:"🔢"}, {q:"10 * 10", a:"100", h:"🔢"}, {q:"12 * 5", a:"60", h:"🔢"}, {q:"15 * 4", a:"60", h:"🔢"}, {q:"25 * 4", a:"100", h:"🔢"}, {q:"11 * 8", a:"88", h:"🔢"}, {q:"13 * 3", a:"39", h:"🔢"}, {q:"5 * 20", a:"100", h:"🔢"}, {q:"9 * 4", a:"36", h:"🔢"}, {q:"7 * 8", a:"56", h:"🔢"}, {q:"6 * 9", a:"54", h:"🔢"}, {q:"100 / 2", a:"50", h:"➗"}, {q:"80 / 4", a:"20", h:"➗"}, {q:"25 / 5", a:"5", h:"➗"}, {q:"36 / 6", a:"6", h:"➗"}, {q:"50 / 5", a:"10", h:"➗"}, {q:"40 / 8", a:"5", h:"➗"}, {q:"90 / 3", a:"30", h:"➗"}, {q:"12 / 4", a:"3", h:"➗"}, {q:"60 / 10", a:"6", h:"➗"}, {q:"100 / 4", a:"25", h:"➗"}, {q:"72 / 8", a:"9", h:"➗"}, {q:"63 / 9", a:"7", h:"➗"}, {q:"56 / 7", a:"8", h:"➗"}, {q:"45 / 5", a:"9", h:"➗"}, {q:"32 / 4", a:"8", h:"➗"}, {q:"21 / 3", a:"7", h:"➗"}, {q:"18 / 2", a:"9", h:"➗"}, {q:"100 / 5", a:"20", h:"➗"}, {q:"9 * 7", a:"63", h:"🔢"}, {q:"8 * 3", a:"24", h:"🔢"}, {q:"14 * 2", a:"28", h:"🔢"}, {q:"50 / 2", a:"25", h:"➗"}, {q:"16 * 3", a:"48", h:"🔢"}, {q:"48 / 6", a:"8", h:"➗"}, {q:"11 * 5", a:"55", h:"🔢"}, {q:"99 / 9", a:"11", h:"➗"}, {q:"7 * 6", a:"42", h:"🔢"}, {q:"81 / 9", a:"9", h:"➗"}, {q:"13 * 2", a:"26", h:"🔢"}, {q:"60 / 4", a:"15", h:"➗"}, {q:"4 * 12", a:"48", h:"🔢"}, {q:"100 / 10", a:"10", h:"➗"}
        ],
        english: [
            {q:"Translate: 'ባኒ'", a:"bread", h:"🍞"}, {q:"Translate: 'ማይ'", a:"water", h:"💧"}, {q:"Translate: 'ቤት ትምህርቲ'", a:"school", h:"🏫"}, {q:"Translate: 'መምህር'", a:"teacher", h:"👨‍🏫"}, {q:"Opposite of Hot?", a:"cold", h:"❄️"}
        ],
        tigrinya: [
            {q:"'Book' ብትግርኛ?", a:"መጽሓፍ", h:"📚"}, {q:"'House' ብትግርኛ?", a:"ገዛ", h:"🏠"}, {q:"'Car' ብትግርኛ?", a:"መኪና", h:"🚗"}, {q:"'Family' ብትግርኛ?", a:"ስድራ", h:"👪"}
        ],
        german: [
            {q:"'Haus' (English?)", a:"house", h:"🏠"}, {q:"'Milch' (English?)", a:"milk", h:"🥛"}, {q:"'Danke' (English?)", a:"thanks", h:"🙏"}
        ],
        shopping: [
            {q:"You have £20, buy a shirt for £12. Change?", a:"8", h:"👕"}, {q:"Price is £5, you want 3. Total?", a:"15", h:"💰"}, {q:"ምዕዳግ (English?)", a:"buy", h:"🛒"}
        ]
    };

    async function fetchScores() {
        try {
            const res = await fetch(SCRIPT_URL);
            const data = await res.json();
            renderDashboard(data);
        } catch (e) { renderDashboard([]); }
    }

    function renderDashboard(onlineData) {
        const list = document.getElementById('players-list');
        list.innerHTML = '';
        let sortedPlayers = playersConfig.map(p => {
            const score = (onlineData.find(d => d.name === p.name) || {score: 0}).score;
            return { ...p, score: score };
        });
        sortedPlayers.sort((a, b) => b.score - a.score);

        sortedPlayers.forEach((p, index) => {
            const div = document.createElement('div');
            div.className = `p-row`;
            div.innerHTML = `
                <div class="p-left">
                    <img src="${p.img}" class="p-photo">
                    <div class="p-info">
                        <span class="p-name">${p.name}</span>
                    </div>
                </div>
                <span class="score-box" style="background:${p.name==='ERKABEL'?'var(--blue)':'var(--pink)'}">${p.score}</span>
            `;
            div.onclick = () => { activeP = p; showSetup(); };
            list.appendChild(div);
        });
    }

    function showSetup() {
        document.getElementById('dashboard-view').style.display = 'none';
        document.getElementById('setup-view').style.display = 'block';
    }

    function startGame(mode) {
        currentMode = mode;
        document.getElementById('setup-view').style.display = 'none';
        document.getElementById('game-view').style.display = 'block';
        document.getElementById('activePName').innerText = activeP.name;
        document.getElementById('sVal').innerText = activeP.score;
        startTime = Date.now(); 
        next();
    }

    function next() {
        const list = questions[currentMode];
        const item = list[Math.floor(Math.random()*list.length)];
        currentAns = item.a;
        document.getElementById('qHint').innerText = item.h;
        document.getElementById('qMain').innerText = item.q;
        document.getElementById('ansInput').value = '';
    }

    function checkAns() {
        const val = document.getElementById('ansInput').value.trim().toLowerCase();
        const endTime = Date.now();
        const timeTaken = Math.round((endTime - startTime) / 1000); 

        if(val === currentAns.toLowerCase()) {
            // ትኽክለኛ ኣደማምራ (Fixing the 100010 error)
            let currentScore = Number(activeP.score) || 0;
            activeP.score = currentScore + 10;
            
            document.getElementById('sVal').innerText = activeP.score;
            
            fetch(SCRIPT_URL, { 
                method: 'POST', 
                mode: 'no-cors', 
                body: JSON.stringify({
                    name: activeP.name,
                    score: activeP.score,
                    time: timeTaken + "s",
                    subject: currentMode
                }) 
            });

            alert(`🌟 ጽቡቕ ስራሕ! (${timeTaken} ሰከንድ ወሲዱልካ)`);
            startTime = Date.now(); 
            next();
        } else {
            alert("💡 እንደገና ፈትን! መልሲ: " + currentAns);
        }
    }
    fetchScores();
</script>
</body>
</html>
