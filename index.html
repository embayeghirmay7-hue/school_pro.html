 <!DOCTYPE html>
<html lang="ti">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEPM Academy</title>
    <style>
        :root { --gold: #D4AF37; --blue: #3498db; --pink: #ff69b4; --dark: #2c3e50; }
        
        /* እቲ ዝፈተኻዮ ድሕረ-ባይታ (Stable Background) */
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background-color: #f4f7f6; 
            background-image: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center;
        }

        .main-card { 
            background: white; width: 100%; max-width: 500px; 
            border-radius: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); 
            overflow: hidden; border-top: 10px solid var(--gold); 
        }

        h1 { color: var(--gold); margin: 25px 0 5px; font-size: 30px; letter-spacing: 2px; }
        
        .kids-line { font-size: 14px; font-weight: bold; margin-bottom: 20px; color: #7f8c8d; }
        
        /* Question Box - No background change here */
        .question-area { padding: 40px 20px; }
        
        /* This is where the color changes with the question */
        #kidName { font-size: 28px; font-weight: 900; margin-bottom: 10px; transition: 0.3s; }
        #qText { font-size: 45px; font-weight: bold; color: var(--dark); margin: 15px 0; }
        #qTrans { font-size: 20px; color: #7f8c8d; font-style: italic; }

        input { 
            width: 60%; padding: 15px; font-size: 24px; border-radius: 15px; 
            border: 3px solid #eee; text-align: center; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--gold); }

        .btn { 
            background: var(--gold); color: white; padding: 15px 40px; 
            border: none; border-radius: 50px; font-size: 20px; cursor: pointer; 
            margin: 20px 0; width: 80%; font-weight: bold;
        }
        
        .score-box { font-size: 22px; color: var(--gold); font-weight: bold; padding-bottom: 20px; }
    </style>
</head>
<body>

<div class="main-card">
    <h1>✨ HEPM ACADEMY ✨</h1>
    <div class="kids-line">HERMELA • ERKABEL • PEGGY • MARANATA</div>

    <div class="question-area">
        <div id="kidName">...</div>
        <div id="qText">...</div>
        <div id="qTrans">...</div>
        
        <input type="number" id="ansInput" placeholder="?">
        <br>
        <button class="btn" onclick="check()">CHECK / መርምር</button>
        <div id="feedback" style="height:30px; font-weight:bold; margin-top:10px;"></div>
    </div>

    <div class="score-box">⭐ Score: <span id="score">0</span></div>
</div>

<audio id="correctSound" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3"></audio>

<script>
    let currentAns, score = 0;
    const kids = [
        {name: "HERMELA", color: "#ff69b4"},
        {name: "ERKABEL", color: "#3498db"},
        {name: "PEGGY", color: "#ff69b4"},
        {name: "MARANATA", color: "#ff69b4"}
    ];

    function next() {
        let kid = kids[Math.floor(Math.random() * kids.length)];
        let n1 = Math.floor(Math.random() * 12) + 1;
        let n2 = Math.floor(Math.random() * 10) + 1;
        
        currentAns = n1 + n2;
        
        // Only change the Name and its Color
        let nameEl = document.getElementById('kidName');
        nameEl.innerText = kid.name;
        nameEl.style.color = kid.color;

        document.getElementById('qText').innerText = `${n1} + ${n2}`;
        document.getElementById('qTrans').innerText = `${n1} ደሚርካ ${n2}`;
        document.getElementById('ansInput').value = "";
        document.getElementById('ansInput').focus();
    }

    function check() {
        let u = parseInt(document.getElementById('ansInput').value);
        let fb = document.getElementById('feedback');
        if(u === currentAns) {
            document.getElementById('correctSound').play();
            fb.innerText = "✅ Excellent!"; fb.style.color = "green";
            score += 10;
            document.getElementById('score').innerText = score;
            setTimeout(() => { fb.innerText = ""; next(); }, 1500);
        } else {
            fb.innerText = "❌ Try Again!"; fb.style.color = "red";
        }
    }

    next();
</script>

</body>
</html>
