 <!DOCTYPE html>
<html lang="ti">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEPM ACADEMY - RANKING</title>
    <style>
        :root { --gold: #D4AF37; --silver: #C0C0C0; --bronze: #CD7F32; --dark: #111; --pink: #e83e8c; --blue: #007bff; }
        body { font-family: sans-serif; background: #f0f2f5; text-align: center; margin: 0; padding: 10px; }
        .card { background: white; max-width: 450px; margin: auto; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); padding: 20px; min-height: 85vh; }
        .p-row { border: 2px solid #eee; border-radius: 18px; margin: 10px 0; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; background: white; transition: 0.3s; }
        .p-row:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .p-left { display: flex; align-items: center; gap: 10px; }
        .rank-num { font-weight: bold; font-size: 18px; width: 25px; color: #666; }
        .p-photo { width: 50px; height: 50px; border-radius: 50%; border: 2px solid #ddd; object-fit: cover; }
        .p-info { text-align: left; }
        .p-name { font-weight: bold; font-size: 17px; display: block; }
        .p-level { font-size: 12px; color: #888; font-weight: bold; text-transform: uppercase; }
        .score-box { color: white; padding: 5px 15px; border-radius: 20px; font-weight: bold; min-width: 40px; }
        .rank-1 { border-color: var(--gold); background: #fffdf0; }
        #game-view, #setup-view { display: none; }
        .black-book { background: var(--dark); color: white; padding: 40px 20px; border-radius: 20px; margin: 20px 0; }
        .mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .mode-btn { padding: 20px; border-radius: 15px; border: 2px solid #eee; cursor: pointer; font-weight: bold; background: #fff; }
        input { width: 85%; padding: 15px; font-size: 18px; border-radius: 12px; border: 2px solid #ddd; margin: 10px 0; text-align: center; }
        .btn { background: var(--gold); color: white; padding: 18px; border: none; border-radius: 12px; width: 95%; font-size: 20px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <div id="dashboard-view">
        <h1 style="color: var(--gold);">🏆 LEADERBOARD</h1>
        <div id="players-list">Loading Rankings...</div>
        <button onclick="fetchScores()" style="margin-top:20px; background:none; border:1px solid #ccc; padding:8px 15px; border-radius:10px; cursor:pointer;">🔄 Refresh Scores</button>
    </div>

    <div id="setup-view">
        <button onclick="location.reload()" style="float:left; background:none; border:none; cursor:pointer; font-size:20px;">🏠</button>
        <h2 id="setupTitle">Subject</h2>
        <div class="mode-grid">
            <div class="mode-btn" onclick="startGame('math')">🔢 MATH</div>
            <div class="mode-btn" onclick="startGame('english')">🇬🇧 ENGLISH</div>
            <div class="mode-btn" onclick="startGame('tigrinya')">🇪🇷 TIGRINYA</div>
            <div class="mode-btn" onclick="startGame('german')">🇩🇪 GERMAN</div>
        </div>
    </div>

    <div id="game-view">
        <div style="display:flex; justify-content: space-between; align-items: center;">
            <button onclick="showSetup()" style="background:none; border:none; cursor:pointer; font-size:20px;">⬅️</button>
            <div style="font-weight:bold; color:var(--gold); font-size: 22px;">💰 <span id="sVal">0</span></div>
        </div>
        <h2 id="activePName" style="margin:5px 0;"></h2>
        <div class="black-book">
            <div id="qHint" style="font-size: 50px;"></div>
            <div id="qMain" style="font-size: 22px; margin-top: 10px; font-weight: bold;"></div>
        </div>
        <input type="text" id="ansInput" placeholder="Your answer...">
        <button class="btn" onclick="checkAns()">CHECK</button>
    </div>
</div>

<script>
    // እታ ሓዳስ ሊንክ እዚኣ እያ
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw1rDVmkG3hITa_q-E8OQWbadTNiEN-PpsNBvho2zP7brA8cxYyZWeLa30lf7YAoC2OZQ/exec"; 
    
    let activeP, currentAns, currentMode;

    const playersConfig = [
        {name: "HERMELA", img: "https://www.w3schools.com/w3images/avatar6.png"},
        {name: "ERKABEL", img: "https://www.w3schools.com/w3images/avatar2.png"},
        {name: "PEGGY", img: "https://www.w3schools.com/w3images/avatar5.png"},
        {name: "MARANATA", img: "https://www.w3schools.com/w3images/avatar3.png"}
    ];

    const questions = {
        math: [{q:"15 + 5", a:"20", h:"🔢"}, {q:"25 - 10", a:"15", h:"🔢"}, {q:"4 * 2", a:"8", h:"🔢"}],
        english: [{q:"This is an ___", a:"This is an apple", h:"🍎"}, {q:"I live in a ___", a:"I live in a house", h:"🏠"}],
        tigrinya: [{q:"እዚ ___ እዩ", a:"እዚ ገዛ እዩ", h:"🏠"}, {q:"እታ ___ ትጎዪ ኣላ", a:"እታ መኪና ትጎዪ ኣላ", h:"🚗"}],
        german: [{q:"Das ist ein ___", a:"Das ist ein Apfel", h:"🍎"}, {q:"Ich wohne in einem ___", a:"Ich wohne in einem Haus", h:"🏠"}]
    };

    async function fetchScores() {
        try {
            const res = await fetch(SCRIPT_URL);
            const data = await res.json();
            renderDashboard(data);
        } catch (e) { renderDashboard([]); }
    }

    function getLevel(score) {
        if (score < 100) return "Level 1: Beginner";
        if (score < 300) return "Level 2: Smarty";
        return "Level 3: Master 👑";
    }

    function renderDashboard(onlineData) {
        const list = document.getElementById('players-list');
        list.innerHTML = '';
        let sortedPlayers = playersConfig.map(p => {
            const score = (onlineData.find(d => d.name === p.name) || {score: 0}).score;
            return { ...p, score: score };
        });
        sortedPlayers.sort((a, b) => b.score - a.score);

        sortedPlayers.forEach((p, index) => {
            const rank = index + 1;
            let rankIcon = rank === 1 ? "🏆" : (rank === 2 ? "🥈" : (rank === 3 ? "🥉" : rank));
            const div = document.createElement('div');
            div.className = `p-row ${rank === 1 ? 'rank-1' : ''}`;
            div.innerHTML = `
                <div class="p-left">
                    <span class="rank-num">${rankIcon}</span>
                    <img src="${p.img}" class="p-photo">
                    <div class="p-info">
                        <span class="p-name">${p.name}</span>
                        <span class="p-level">${getLevel(p.score)}</span>
                    </div>
                </div>
                <span class="score-box" style="background:${p.name==='ERKABEL'?'var(--blue)':'var(--pink)'}">${p.score}</span>
            `;
            div.onclick = () => { activeP = p; showSetup(); };
            list.appendChild(div);
        });
    }

    function showSetup() {
        document.getElementById('dashboard-view').style.display = 'none';
        document.getElementById('setup-view').style.display = 'block';
    }

    function startGame(mode) {
        currentMode = mode;
        document.getElementById('setup-view').style.display = 'none';
        document.getElementById('game-view').style.display = 'block';
        document.getElementById('activePName').innerText = activeP.name;
        document.getElementById('sVal').innerText = activeP.score;
        next();
    }

    function next() {
        const list = questions[currentMode];
        const item = list[Math.floor(Math.random()*list.length)];
        currentAns = item.a;
        document.getElementById('qHint').innerText = item.h;
        document.getElementById('qMain').innerText = item.q;
        document.getElementById('ansInput').value = '';
    }

    function checkAns() {
        const val = document.getElementById('ansInput').value.trim().toLowerCase();
        if(val === currentAns.toLowerCase()) {
            activeP.score += 10;
            document.getElementById('sVal').innerText = activeP.score;
            fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(activeP) });
            alert("✅ Correct!"); next();
        } else { alert("❌ Correct answer: " + currentAns); }
    }
    fetchScores();
</script>
</body>
</html>
