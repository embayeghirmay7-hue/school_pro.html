 <!DOCTYPE html>
<html lang="ti">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEPM ACADEMY</title>
    <style>
        :root { --gold: #D4AF37; --blue: #3498db; --pink: #ff69b4; --dark: #1a1a1a; }
        body { font-family: 'Arial', sans-serif; background: #f4f7f6; text-align: center; padding: 15px; }
        .card { background: white; max-width: 500px; margin: auto; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 10px solid var(--gold); overflow: hidden; }
        
        h1 { color: var(--gold); margin: 20px 0; font-size: 28px; font-weight: 900; }
        #kidName { font-size: 28px; font-weight: bold; margin-bottom: 10px; height: 35px; }

        /* ምርጫታት (Menu) */
        .selector-box { background: #eee; margin: 10px; padding: 10px; border-radius: 15px; display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; }
        .selector-box button { padding: 8px 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; background: white; color: var(--dark); transition: 0.3s; }
        .selector-box button.active { background: var(--gold); color: white; }

        .black-box { background: var(--dark); color: white; margin: 20px; padding: 40px 10px; border-radius: 20px; min-height: 180px; }
        #qMain { font-size: 80px; font-weight: bold; }
        #qSub { font-size: 22px; color: #888; margin-top: 10px; }

        input { width: 70%; padding: 15px; font-size: 24px; border-radius: 15px; border: 3px solid #eee; text-align: center; margin-bottom: 15px; outline: none; }
        .btn-check { background: var(--gold); color: white; padding: 15px 50px; border: none; border-radius: 50px; font-size: 22px; cursor: pointer; width: 85%; font-weight: bold; }
        .score { font-size: 22px; color: var(--gold); font-weight: bold; padding: 15px; }
    </style>
</head>
<body>

<div class="card">
    <h1>✨ HEPM ACADEMY ✨</h1>
    <div id="kidName">...</div>

    <div class="selector-box">
        <button id="btn-math" onclick="setGame('math')">🔢 Maths</button>
        <button id="btn-ti" onclick="setGame('ti')">🇪🇷 ትግርኛ</button>
        <button id="btn-en" onclick="setGame('en')">🇬🇧 English</button>
        <button id="btn-de" onclick="setGame('de')">🇩🇪 Deutsch</button>
    </div>

    <div id="sub-menu" class="selector-box" style="background: #e0e0e0; display:none;">
        <button onclick="setSubMode('letters')">ሀሁሂ / ABC</button>
        <button onclick="setSubMode('words')">ቃላት (Words)</button>
    </div>

    <div class="black-box">
        <div id="qMain">...</div>
        <div id="qSub">...</div>
    </div>

    <input type="text" id="ans" placeholder="Answer here">
    <br>
    <button class="btn-check" onclick="check()">CHECK / መርምር</button>
    <div id="fb" style="height:35px; margin-top:10px; font-weight:bold;"></div>
    <div class="score">⭐ Score: <span id="sc">0</span></div>
</div>

<audio id="win" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3"></audio>

<script>
    let mode = 'math', subMode = 'letters', currentAns, score = 0;
    const kids = [
        {n: "HERMELA", c: "#ff69b4"}, {n: "ERKABEL", c: "#3498db"},
        {n: "PEGGY", c: "#ff69b4"}, {n: "MARANATA", c: "#ff69b4"}
    ];

    const data = {
        ti: {
            letters: [{q:"ሀ", a:"he"}, {q:"ሁ", a:"hu"}, {q:"ሂ", a:"hi"}, {q:"ሃ", a:"ha"}],
            words: [{q:"🍎", a:"apple", s:"ቱፋሕ"}, {q:"🦁", a:"lion", s:"ኣንበሳ"}, {q:"🏠", a:"house", s:"ገዛ"}]
        },
        en: {
            letters: [{q:"A", a:"a"}, {q:"B", a:"b"}],
            words: [{q:"🐶", a:"dog", s:"Dog"}, {q:"🚗", a:"car", s:"Car"}]
        },
        de: {
            letters: [{q:"A", a:"a"}, {q:"B", a:"b"}],
            words: [{q:"🍎", a:"apfel", s:"Apfel"}, {q:"🚗", a:"auto", s:"Auto"}]
        }
    };

    function setGame(m) {
        mode = m;
        document.getElementById('sub-menu').style.display = (m === 'math') ? 'none' : 'flex';
        next();
    }

    function setSubMode(s) {
        subMode = s;
        next();
    }

    function next() {
        let kid = kids[Math.floor(Math.random()*kids.length)];
        let kn = document.getElementById('kidName');
        kn.innerText = kid.n; kn.style.color = kid.c;
        document.getElementById('ans').value = "";

        if(mode === 'math') {
            let n1 = Math.floor(Math.random()*12), n2 = Math.floor(Math.random()*10);
            currentAns = (n1+n2).toString();
            document.getElementById('qMain').innerText = n1 + "+" + n2;
            document.getElementById('qSub').innerText = "Maths Challenge";
        } else {
            let list = data[mode][subMode];
            let pick = list[Math.floor(Math.random()*list.length)];
            currentAns = pick.a;
            document.getElementById('qMain').innerText = pick.q;
            document.getElementById('qSub').innerText = pick.s || "Write the answer";
        }
    }

    function check() {
        let val = document.getElementById('ans').value.trim().toLowerCase();
        if(val === currentAns.toLowerCase()) {
            document.getElementById('win').play();
            score += 10; document.getElementById('sc').innerText = score;
            next();
        }
    }
    setGame('math');
</script>
</body>
</html>
