 <!DOCTYPE html>
<html lang="ti">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEPM ACADEMY</title>
    <style>
        :root { --gold: #D4AF37; --dark: #111; --white: #ffffff; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .card { background: var(--white); width: 100%; max-width: 450px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.15); padding: 25px; min-height: 85vh; margin-top: 20px; }
        h1 { color: var(--gold); font-size: 28px; margin-bottom: 25px; text-transform: uppercase; letter-spacing: 2px; }
        
        /* ቅጥዒ ናይቲ ተጻዋታይ ዝርዝር */
        .p-row { border: 2px solid #eee; border-radius: 18px; margin: 12px 0; padding: 10px 18px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.3s; background: white; }
        .p-row:hover { transform: scale(1.02); }
        .p-left { display: flex; align-items: center; gap: 15px; }
        
        /* ቅጥዒ ናይቲ ነጥቢ ቦክስ */
        .score-box { color: white; padding: 6px 18px; border-radius: 25px; font-weight: bold; font-size: 18px; }

        /* --- ሕብርታት ተጻወቲ --- */
        /* ERKABEL ብሰማያዊ */
        .erkabel-bg { border-color: #007bff; }
        .erkabel-bg:hover { background-color: #e6f2ff; }
        .erkabel-score { background-color: #007bff; }

        /* እቶም ካልኦት (HERMELA, PEGGY, MARANATA) ብPink */
        .pink-bg { border-color: #e83e8c; }
        .pink-bg:hover { background-color: #fcebf2; }
        .pink-score { background-color: #e83e8c; }

        /* ቅጥዒ ናይቲ ስእሊ (Photo) */
        .p-photo { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; background-color: #eee; border: 1px solid #ddd; }

        #game-view { display: none; }
        .black-book { background: var(--dark); color: white; padding: 40px 20px; border-radius: 25px; margin: 25px 0; font-size: 35px; min-height: 150px; display: flex; flex-direction: column; justify-content: center; }
        input { width: 90%; padding: 15px; font-size: 22px; border-radius: 12px; border: 2px solid #ddd; margin: 15px 0; text-align: center; outline: none; }
        input:focus { border-color: var(--gold); }
        .btn { background: var(--gold); color: white; padding: 18px; border: none; border-radius: 12px; width: 100%; font-size: 20px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .home-btn { background: #eee; border: none; padding: 8px 15px; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div class="card">
    <div id="dashboard-view">
        <h1>HEPM ACADEMY</h1>
        <div id="players-list">
            <p style="color: #666;">Loading scores...</p>
        </div>
        <button onclick="fetchScores()" style="margin-top:25px; background:none; border:1px solid #ccc; padding:10px 20px; border-radius:10px; cursor:pointer; color: #666;">🔄 Refresh Dashboard</button>
    </div>

    <div id="game-view">
        <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <button class="home-btn" onclick="location.reload()">🏠 Home</button>
            <h2 id="activePName" style="margin:0; color:#333;"></h2>
            <div style="font-weight:bold; color:var(--gold); font-size: 22px;">💰 <span id="sVal">0</span></div>
        </div>
        <div class="black-book">
            <div id="qHint" style="font-size: 70px; margin-bottom: 10px;"></div>
            <div id="qMain" style="letter-spacing: 5px; font-weight: bold;"></div>
        </div>
        <input type="text" id="ansInput" placeholder="Type answer here..." autocomplete="off">
        <button class="btn" onclick="checkAns()">CHECK ANSWER</button>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyCAzQHgrTnZD8r3kDdmP8wdVoPjGOiK8q9JB-kQCFSZaMPl40sVlRTa6NELTb3pKqd/exec"; 

    let activeP, currentAns;

    // --- ኣዝዩ ኣገዳሲ: እቲ ናይ ስእሊ ሊንክ (URL) ኣብዚኣ ተካእዮ ---
    // ሕጂ ንኩሎም ተመሳሳሊ ስእሊ ጌረልካ ኣለኹ (ሓደ ሕጻን ዘርኢ)
    const playersConfig = [
        { name: "HERMELA", photo: "https://www.w3schools.com/w3images/avatar2.png" },
        { name: "ERKABEL", photo: "https://www.w3schools.com/w3images/avatar2.png" },
        { name: "PEGGY", photo: "https://www.w3schools.com/w3images/avatar2.png" },
        { name: "MARANATA", photo: "https://www.w3schools.com/w3images/avatar2.png" }
    ];

    const db = [
        {q:"🍎", a:"APPLE"}, {q:"🏠", a:"HOUSE"}, {q:"🦁", a:"LION"}, 
        {q:"🚗", a:"CAR"}, {q:"🌞", a:"SUN"}, {q:"🐶", a:"DOG"},
        {q:"🐱", a:"CAT"}, {q:"🌳", a:"TREE"}, {q:"🐘", a:"ELEPHANT"}
    ];

    async function fetchScores() {
        try {
            const res = await fetch(SCRIPT_URL);
            const data = await res.json();
            renderDashboard(data);
        } catch (e) {
            renderDashboard([]);
        }
    }

    function renderDashboard(onlineData) {
        const list = document.getElementById('players-list');
        list.innerHTML = '';
        playersConfig.forEach(p => {
            const pOnlineData = onlineData.find(d => d.name === p.name) || {score: 0};
            
            // ምውሳን ሕብርታት
            const isErkabel = p.name === "ERKABEL";
            const rowClass = isErkabel ? 'erkabel-bg' : 'pink-bg';
            const scoreClass = isErkabel ? 'erkabel-score' : 'pink-score';

            const div = document.createElement('div');
            div.className = `p-row ${rowClass}`;
            div.innerHTML = `
                <div class="p-left">
                    <img src="${p.photo}" alt="${p.name}" class="p-photo">
                    <span class="p-name" style="font-size: 20px; font-weight: bold; color: #333;">${p.name}</span>
                </div>
                <span class="score-box ${scoreClass}">${pOnlineData.score}</span>
            `;
            div.onclick = () => { 
                activeP = {name: p.name, score: pOnlineData.score}; 
                startGame(); 
            };
            list.appendChild(div);
        });
    }

    // --- እቲ ጸወታን ነጥብን ዘርኢ ክፋል (ከም ቀደሙ) ---
    function startGame() {
        document.getElementById('dashboard-view').style.display = 'none';
        document.getElementById('game-view').style.display = 'block';
        document.getElementById('activePName').innerText = activeP.name;
        document.getElementById('sVal').innerText = activeP.score;
        next();
    }

    function next() {
        const item = db[Math.floor(Math.random()*db.length)];
        currentAns = item.a;
        document.getElementById('qHint').innerText = item.q;
        document.getElementById('qMain').innerText = item.a[0] + "_".repeat(item.a.length - 1);
        document.getElementById('ansInput').value = '';
        document.getElementById('ansInput').focus();
    }

    async function checkAns() {
        const val = document.getElementById('ansInput').value.trim().toUpperCase();
        if(val === currentAns) {
            activeP.score += 10;
            document.getElementById('sVal').innerText = activeP.score;
            
            fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(activeP)
            });

            alert("Correct! +10 💰🎉");
            next();
        } else {
            alert("Oops! Try again. The answer is " + currentAns);
        }
    }

    fetchScores();
</script>

</body>
</html>
