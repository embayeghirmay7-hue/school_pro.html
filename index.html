<!DOCTYPE html>
<html lang="ti">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEPM ACADEMY</title>
    <style>
        :root { --gold: #D4AF37; --blue: #3498db; --pink: #ff69b4; --dark: #1a1a1a; }
        body { font-family: 'Arial', sans-serif; background: #f4f7f6; text-align: center; padding: 15px; margin: 0; }
        .card { background: white; max-width: 500px; margin: 15px auto; border-radius: 30px; box-shadow: 0 15px 40px rgba(0,0,0,0.1); border-top: 10px solid var(--gold); overflow: hidden; padding-bottom: 20px; }
        h1 { color: var(--gold); margin: 20px 0 5px; font-size: 28px; font-weight: 900; }
        #kidName { font-size: 30px; font-weight: bold; margin-bottom: 15px; height: 35px; }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 0 20px 15px; }
        .menu-grid button { padding: 12px; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; background: #eee; font-size: 14px; transition: 0.2s; }
        .menu-grid button.active { background: var(--gold); color: white; }
        .black-box { background: var(--dark); color: white; margin: 0 20px 15px; padding: 45px 10px; border-radius: 20px; min-height: 180px; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; }
        #qMain { font-size: 100px; font-weight: bold; line-height: 1; }
        #qSub { font-size: 22px; color: #888; margin-top: 15px; }
        input { width: 75%; padding: 16px; font-size: 26px; border-radius: 15px; border: 3px solid #eee; text-align: center; margin-bottom: 15px; outline: none; }
        .btn-check { background: var(--gold); color: white; padding: 16px; border: none; border-radius: 50px; font-size: 22px; cursor: pointer; width: 85%; font-weight: bold; }
        .status-bar { display: flex; justify-content: space-around; padding: 10px; font-size: 20px; font-weight: bold; color: var(--gold); }
        .lvl-up { color: #2ecc71; font-size: 24px; font-weight: bold; position: absolute; top: 50%; width: 100%; display: none; }
    </style>
</head>
<body>

<div class="card">
    <h1>✨ HEPM ACADEMY ✨</h1>
    <div id="kidName">...</div>
    <div class="menu-grid">
        <button id="m-math" onclick="setMode('math')">🔢 Maths</button>
        <button id="m-ti" onclick="setMode('ti')">🇪🇷 ትግርኛ</button>
        <button id="m-en" onclick="setMode('en')">🇬🇧 English</button>
        <button id="m-de" onclick="setMode('de')">🇩🇪 Deutsch</button>
    </div>
    <div class="black-box" onclick="speakCurrent()">
        <div id="qMain">...</div>
        <div id="qSub">...</div>
        <div id="voiceHint" style="font-size: 12px; color: var(--gold); margin-top: 15px;">🔈 Hear Sound</div>
    </div>
    <input type="text" id="ansInput" placeholder="Type here...">
    <br>
    <button class="btn-check" onclick="check()">CHECK / መርምር</button>
    
    <div id="fb" style="height:25px; margin-top:10px; font-weight:bold;"></div>
    
    <div class="status-bar">
        <div>⭐ Score: <span id="scoreVal">0</span></div>
        <div>🏆 Level: <span id="levelVal">1</span></div>
    </div>
</div>

<script>
    let currentMode = 'math', currentAns, currentSpeak, score = 0, level = 1;
    const kids = [{n:"HERMELA", c:"#ff69b4"}, {n:"ERKABEL", c:"#3498db"}, {n:"PEGGY", c:"#ff69b4"}, {n:"MARANATA", c:"#ff69b4"}];

    const tigrinya = [
        {q:"ሀ", a:"he"}, {q:"ሁ", a:"hu"}, {q:"ሂ", a:"hi"}, {q:"ሃ", a:"ha"}, {q:"ለ", a:"le"}, {q:"ሉ", a:"lu"}, {q:"ሊ", a:"li"}, {q:"ላ", a:"la"},
        {q:"መ", a:"me"}, {q:"ሙ", a:"mu"}, {q:"ሚ", a:"mi"}, {q:"ማ", a:"ma"}, {q:"ረ", a:"re"}, {q:"ሩ", a:"ru"}, {q:"ሪ", a:"ri"}, {q:"ራ", a:"ra"},
        {q:"ሰ", a:"se"}, {q:"ሱ", a:"su"}, {q:"ሲ", a:"si"}, {q:"ሳ", a:"sa"}, {q:"ቀ", a:"qe"}, {q:"ቁ", a:"qu"}, {q:"ቂ", a:"qi"}, {q:"ቃ", a:"qa"},
        {q:"በ", a:"be"}, {q:"ቡ", a:"bu"}, {q:"ቢ", a:"bi"}, {q:"ባ", a:"ba"}, {q:"ተ", a:"te"}, {q:"ቱ", a:"tu"}, {q:"ቲ", a:"ti"}, {q:"ታ", a:"ta"}
    ];

    const english = [
        {q:"🦁", a:"lion", v:"Lion"}, {q:"🐘", a:"elephant", v:"Elephant"}, {q:"🍎", a:"apple", v:"Apple"}, 
        {q:"🚗", a:"car", v:"Car"}, {q:"🏠", a:"house", v:"House"}, {q:"🐶", a:"dog", v:"Dog"},
        {q:"⚽", a:"ball", v:"Ball"}, {q:"🥛", a:"milk", v:"Milk"}, {q:"🍌", a:"banana", v:"Banana"}
    ];

    const deutsch = [
        {q:"Ä", a:"ä"}, {q:"Ö", a:"ö"}, {q:"Ü", a:"ü"}, {q:"ß", a:"ss", v:"Eszett"},
        {q:"🦁", a:"löwe", v:"Löwe"}, {q:"🐘", a:"elefant", v:"Elefant"}, {q:"🍎", a:"apfel", v:"Apfel"},
        {q:"🚗", a:"auto", v:"Auto"}, {q:"🚲", a:"fahrrad", v:"Fahrrad"}, {q:"🍞", a:"brot", v:"Brot"}
    ];

    function speakCurrent() {
        if (!currentSpeak || currentMode === 'ti') return;
        window.speechSynthesis.cancel();
        let msg = new SpeechSynthesisUtterance(currentSpeak);
        msg.lang = (currentMode === 'de') ? 'de-DE' : 'en-US';
        msg.rate = 0.8;
        window.speechSynthesis.speak(msg);
    }

    function setMode(mode) {
        currentMode = mode;
        document.querySelectorAll('.menu-grid button').forEach(b => b.classList.remove('active'));
        document.getElementById('m-' + mode).classList.add('active');
        document.getElementById('voiceHint').style.display = (mode === 'ti') ? 'none' : 'block';
        next();
    }

    function next() {
        let kid = kids[Math.floor(Math.random() * kids.length)];
        let kn = document.getElementById('kidName');
        kn.innerText = kid.n; kn.style.color = kid.c;
        document.getElementById('ansInput').value = "";
        document.getElementById('ansInput').focus();

        if (currentMode === 'math') {
            // Level ጸጋም ቁጽርታት ይውስኽ
            let maxN = level * 10;
            let n1 = Math.floor(Math.random() * maxN) + 1;
            let n2 = Math.floor(Math.random() * 10) + 1;
            currentAns = (n1 + n2).toString(); currentSpeak = n1 + " plus " + n2;
            document.getElementById('qMain').innerText = n1 + "+" + n2;
            document.getElementById('qSub').innerText = "Maths Challenge";
        } else {
            let list = (currentMode === 'ti') ? tigrinya : (currentMode === 'en' ? english : deutsch);
            let p = list[Math.floor(Math.random() * list.length)];
            currentAns = p.a; currentSpeak = p.v || p.a;
            document.getElementById('qMain').innerText = p.q;
            document.getElementById('qSub').innerText = (currentMode === 'ti') ? "Write: " + p.a : "Write the answer";
        }
        if (currentMode !== 'ti') speakCurrent();
    }

    function check() {
        let val = document.getElementById('ansInput').value.trim().toLowerCase();
        let fb = document.getElementById('fb');
        if (val === currentAns.toLowerCase() || (currentAns === "ss" && val === "ß")) {
            fb.innerText = "🌟 EXCELLENT!"; fb.style.color = "green";
            score += 10;
            
            // Level Up logic (ነፍሲ ወከፍ 100 Score ሓደ Level ይውስኽ)
            if (score > 0 && score % 100 === 0) {
                level++;
                fb.innerText = "🚀 LEVEL UP! Level " + level;
                fb.style.color = "#2ecc71";
            }
            
            document.getElementById('scoreVal').innerText = score;
            document.getElementById('levelVal').innerText = level;
            setTimeout(() => { fb.innerText = ""; next(); }, 1200);
        } else {
            fb.innerText = "❌ TRY AGAIN!"; fb.style.color = "red";
        }
    }
    setMode('math');
</script>
</body>
</html>
