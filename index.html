 <!DOCTYPE html>
<html lang="ti">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEPM ACADEMY</title>
    <style>
        :root { --gold: #D4AF37; --blue: #3498db; --pink: #ff69b4; --dark: #1a1a1a; }
        body { font-family: 'Arial', sans-serif; background: #f4f7f6; text-align: center; padding: 20px; }
        .card { background: white; max-width: 500px; margin: auto; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 10px solid var(--gold); overflow: hidden; }
        h1 { color: var(--gold); margin-top: 25px; font-size: 28px; }
        #kidName { font-size: 26px; font-weight: bold; margin: 15px 0; height: 35px; }

        .black-box { background: var(--dark); color: white; margin: 20px; padding: 45px 20px; border-radius: 20px; min-height: 120px; display: flex; flex-direction: column; justify-content: center; align-items: center;}
        #qMain { font-size: 80px; font-weight: bold; }
        #qSub { font-size: 20px; color: #888; margin-top: 10px; }

        .menu { display: flex; justify-content: center; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; }
        .menu button { padding: 10px 15px; border-radius: 10px; border: none; cursor: pointer; background: #eee; font-weight: bold; font-size: 14px; }
        .menu button:hover { background: var(--gold); color: white; }

        input { width: 65%; padding: 15px; font-size: 24px; border-radius: 15px; border: 3px solid #eee; text-align: center; margin-bottom: 15px; outline: none; }
        .btn { background: var(--gold); color: white; padding: 15px 40px; border: none; border-radius: 50px; font-size: 22px; cursor: pointer; width: 85%; font-weight: bold; }
        
        .score { font-size: 22px; color: var(--gold); font-weight: bold; padding: 20px; }
    </style>
</head>
<body>

<div class="card">
    <h1>✨ HEPM ACADEMY ✨</h1>
    
    <div id="kidName">...</div>

    <div class="menu">
        <button onclick="setMode('math')">🔢 Maths</button>
        <button onclick="setMode('ti')">🇪🇷 ትግርኛ (ሀ-ፐ)</button>
        <button onclick="setMode('en')">🇬🇧 English (A-Z)</button>
        <button onclick="setMode('de')">🇩🇪 Deutsch (A-Z)</button>
    </div>

    <div class="black-box">
        <div id="qMain">...</div>
        <div id="qSub">...</div>
    </div>

    <input type="text" id="ans" placeholder="Type here...">
    <br>
    <button class="btn" onclick="check()">CHECK / መርምር</button>
    <div id="fb" style="height:35px; margin-top:10px; font-weight:bold; font-size: 20px;"></div>

    <div class="score">⭐ Score: <span id="sc">0</span></div>
</div>

<audio id="win" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3"></audio>

<script>
    let mode = 'math', currentAns, score = 0;
    const kids = [
        {n: "HERMELA", c: "#ff69b4"}, {n: "ERKABEL", c: "#3498db"},
        {n: "PEGGY", c: "#ff69b4"}, {n: "MARANATA", c: "#ff69b4"}
    ];

    const tigrinyaLetters = ["ሀ", "ሁ", "ሂ", "ሃ", "ሄ", "ህ", "ሆ", "ለ", "ሉ", "ሊ", "ላ", "ሌ", "ል", "ሎ"];
    const englishLetters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");

    function setMode(m) { mode = m; next(); }

    function next() {
        let kid = kids[Math.floor(Math.random()*kids.length)];
        let kn = document.getElementById('kidName');
        kn.innerText = kid.n; kn.style.color = kid.c;
        
        document.getElementById('ans').value = "";
        document.getElementById('ans').focus();

        if(mode === 'math') {
            let n1 = Math.floor(Math.random()*12)+1, n2 = Math.floor(Math.random()*10)+1;
            currentAns = (n1+n2).toString();
            document.getElementById('qMain').innerText = n1 + " + " + n2;
            document.getElementById('qSub').innerText = "ደሚርካ (Plus)";
        } 
        else if(mode === 'ti') {
            currentAns = tigrinyaLetters[Math.floor(Math.random()*tigrinyaLetters.length)];
            document.getElementById('qMain').innerText = currentAns;
            document.getElementById('qSub').innerText = "Write this Tigrinya letter";
        }
        else if(mode === 'en') {
            currentAns = englishLetters[Math.floor(Math.random()*englishLetters.length)];
            document.getElementById('qMain').innerText = currentAns;
            document.getElementById('qSub').innerText = "Write this English letter";
        }
        else if(mode === 'de') {
            currentAns = englishLetters[Math.floor(Math.random()*englishLetters.length)];
            document.getElementById('qMain').innerText = currentAns;
            document.getElementById('qSub').innerText = "Schreib diesen Buchstaben (DE)";
        }
    }

    function check() {
        let val = document.getElementById('ans').value.trim();
        let f = document.getElementById('fb');
        
        // Handle case sensitivity for alphabets
        let isCorrect = (val.toLowerCase() === currentAns.toLowerCase());

        if(isCorrect) {
            document.getElementById('win').play();
            f.innerText = "✅ EXCELLENT! / ብርትዕ!"; f.style.color = "green";
            score += 10; document.getElementById('sc').innerText = score;
            setTimeout(() => { f.innerText = ""; next(); }, 1200);
        } else {
            f.innerText = "❌ TRY AGAIN! / እንደገና!"; f.style.color = "red";
        }
    }
    next();
</script>
</body>
</html>
