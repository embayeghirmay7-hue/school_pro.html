 <!DOCTYPE html>
<html lang="ti">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEPM ACADEMY - Fixed</title>
    <style>
        :root { --gold: #D4AF37; --dark: #111; --red: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; text-align: center; margin: 0; padding: 10px; }
        .card { background: white; max-width: 550px; margin: 10px auto; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); border-top: 10px solid var(--gold); overflow: hidden; padding-bottom: 25px; min-height: 400px; }
        
        /* Player Selection Screen */
        #player-screen { padding: 40px 20px; }
        .p-btn { width: 90%; padding: 15px; margin: 10px auto; border: none; border-radius: 15px; font-size: 20px; font-weight: bold; color: white; cursor: pointer; display: block; }

        /* Game Screen */
        .player-header { font-size: 26px; font-weight: 900; padding: 15px; letter-spacing: 2px; }
        .tabs { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; padding: 0 15px 15px; }
        .tab { padding: 12px 5px; border: 2px solid #eee; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 11px; background: #fff; }
        .tab.active { background: var(--gold); color: white; border-color: var(--gold); }

        /* Black Display Box */
        .black-book { background: var(--dark); color: white; margin: 15px; padding: 30px 10px; border-radius: 20px; min-height: 250px; display: flex; flex-direction: column; justify-content: center; align-items: center; border: 4px solid #333; }
        #qHint { font-size: 70px; margin-bottom: 10px; }
        #qMain { font-size: 30px; font-weight: bold; line-height: 1.4; }
        
        /* Correction Label */
        #correction-box { margin-top: 15px; display: none; }
        .cor-label { color: var(--red); font-size: 18px; font-weight: 900; }
        .cor-word { color: var(--red); font-size: 30px; font-weight: 900; text-decoration: underline; }

        /* Controls */
        input { width: 85%; padding: 18px; font-size: 24px; border-radius: 15px; border: 3px solid #ddd; text-align: center; margin-top: 10px; outline: none; }
        .btn-check { background: var(--gold); color: white; padding: 18px; border: none; border-radius: 50px; font-size: 22px; width: 85%; font-weight: bold; margin-top: 15px; cursor: pointer; }
        
        .footer-stats { display: flex; justify-content: space-around; margin-top: 20px; font-weight: bold; color: #777; }
    </style>
</head>
<body>

<audio id="correctSound"><source src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3" type="audio/mpeg"></audio>
<audio id="wrongSound"><source src="https://assets.mixkit.co/active_storage/sfx/2003/2003-preview.mp3" type="audio/mpeg"></audio>

<div class="card">
    <div id="player-screen">
        <h1 style="color: var(--gold);">✨ HEPM ACADEMY ✨</h1>
        <p>SELECT PLAYER TO START</p>
        <div id="pButtons"></div> </div>

    <div id="game-screen" style="display:none;">
        <div class="player-header" id="activePName">PLAYER</div>
        <div class="tabs">
            <div class="tab" id="t-math" onclick="setMode('math')">🔢 MATH</div>
            <div class="tab" id="t-ti" onclick="setMode('ti')">🇪🇷 ትግርኛ</div>
            <div class="tab active" id="t-en" onclick="setMode('en')">🇬🇧 ENGLISH</div>
            <div class="tab" id="t-de" onclick="setMode('de')">🇩🇪 DEUTSCH</div>
        </div>

        <div class="black-book">
            <div id="qHint">🏠</div>
            <div id="qMain">---</div>
            <div id="correction-box">
                <span class="cor-label">TYPE: </span>
                <span class="cor-word" id="correctWord"></span>
            </div>
        </div>

        <input type="text" id="ansInput" placeholder="Answer..." autocomplete="off">
        <button class="btn-check" onclick="checkAns()">CHECK / መርምር</button>

        <div class="footer-stats">
            <div>⭐ Score: <span id="sVal">0</span></div>
            <div>🏆 Level: <span id="lVal">1</span></div>
        </div>
    </div>
</div>

<script>
    const players = [
        {name: "HERMELA", color: "#ff69b4", score: 0, level: 1},
        {name: "ERKABEL", color: "#3498db", score: 0, level: 1},
        {name: "PEGGY", color: "#e67e22", score: 0, level: 1},
        {name: "MARANATA", color: "#9b59b6", score: 0, level: 1}
    ];

    let activeP, mode = 'en', currentAns, needsCorrection = false;

    const database = {
        en: [{q:"🦁", a:"LION", s:"THE LION IS KING"}, {q:"🍎", a:"APPLE", s:"I EAT AN APPLE"}, {q:"🏠", a:"HOUSE", s:"THIS IS MY HOUSE"}],
        de: [{q:"🚗", a:"AUTO", s:"DAS AUTO IST SCHNELL"}, {q:"🏠", a:"HAUS", s:"DAS IST MEIN HAUS"}],
        ti: [{q:"🦁", a:"ኣንበሳ", s:"ኣንበሳ ንጉስ እዩ"}, {q:"🏠", a:"ገዛ", s:"እዚ ገዛይ እዩ"}]
    };

    // 1. Load Player Buttons (Fixes the blank screen)
    const btnContainer = document.getElementById('pButtons');
    players.forEach((p, i) => {
        let b = document.createElement('button');
        b.className = 'p-btn';
        b.style.backgroundColor = p.color;
        b.innerText = p.name;
        b.onclick = () => { activeP = p; startGame(); };
        btnContainer.appendChild(b);
    });

    function startGame() {
        document.getElementById('player-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'block';
        document.getElementById('activePName').innerText = activeP.name;
        document.getElementById('activePName').style.color = activeP.color;
        updateStats();
        setMode('en');
    }

    function setMode(m) {
        mode = m;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('t-' + m).classList.add('active');
        needsCorrection = false;
        next();
    }

    function next() {
        document.getElementById('ansInput').value = '';
        document.getElementById('correction-box').style.display = 'none';
        needsCorrection = false;

        if (mode === 'math') {
            let n1 = Math.floor(Math.random() * 10 * activeP.level), n2 = Math.floor(Math.random() * 10);
            currentAns = (n1 + n2).toString();
            document.getElementById('qHint').innerText = "🔢";
            document.getElementById('qMain').innerText = `${n1} + ${n2}`;
        } else {
            let list = database[mode];
            let item = list[Math.floor(Math.random() * list.length)];
            currentAns = (activeP.level === 1) ? item.a : item.s;
            document.getElementById('qHint').innerText = item.q;
            document.getElementById('qMain').innerText = (activeP.level === 1) ? item.a[0] + "_".repeat(item.a.length-1) : item.s.split(" ").slice(0,-1).join(" ") + " ___";
        }
    }

    // 2. Fixed Scoring Function (Corrected version)
    function checkAns() {
        let val = document.getElementById('ansInput').value.trim().toUpperCase();
        if (val === currentAns.toUpperCase()) {
            if (needsCorrection === false) {
                activeP.score += 10;
                document.getElementById('correctSound').play();
            }
            if (activeP.score > 0 && activeP.score % 100 === 0 && needsCorrection === false) {
                activeP.level++;
            }
            updateStats();
            next();
        } else {
            document.getElementById('wrongSound').play();
            document.getElementById('correction-box').style.display = 'block';
            document.getElementById('correctWord').innerText = currentAns;
            needsCorrection = true;
        }
    }

    function updateStats() {
        document.getElementById('sVal').innerText = activeP.score;
        document.getElementById('lVal').innerText = activeP.level;
    }
</script>
</body>
</html>
