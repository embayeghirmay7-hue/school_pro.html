 <!DOCTYPE html>
<html lang="ti">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEPM ACADEMY - PRO DASHBOARD</title>
    <style>
        :root { --gold: #D4AF37; --dark: #111; --red: #e74c3c; --blue: #3498db; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; text-align: center; margin: 0; padding: 10px; }
        .card { background: white; max-width: 550px; margin: 10px auto; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); border-top: 10px solid var(--gold); min-height: 700px; position: relative; padding-bottom: 30px; overflow: hidden; }
        #dashboard-view { display: block; padding: 20px; }
        #game-view { display: none; }
        .p-row { background: #fff; border: 2px solid #eee; border-radius: 20px; margin: 12px auto; padding: 15px; display: flex; justify-content: space-between; align-items: center; width: 90%; cursor: pointer; transition: 0.2s; }
        .p-row:hover { border-color: var(--gold); background: #fffdf5; }
        .score-box { background: var(--gold); color: white; padding: 8px 15px; border-radius: 50px; font-weight: bold; min-width: 50px; }
        .tabs { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; padding: 10px; background: #f9f9f9; }
        .tab { padding: 12px 5px; border-radius: 10px; cursor: pointer; font-size: 11px; font-weight: bold; background: white; border: 1px solid #ddd; }
        .tab.active { background: var(--gold); color: white; border: none; }
        .black-book { background: var(--dark); color: white; margin: 15px; padding: 30px 10px; border-radius: 25px; min-height: 250px; display: flex; flex-direction: column; justify-content: center; border: 5px solid #333; box-shadow: inset 0 0 20px #000; }
        input { width: 80%; padding: 20px; font-size: 26px; border-radius: 15px; border: 3px solid #ddd; margin-top: 15px; text-align: center; }
        .btn-check { background: var(--gold); color: white; padding: 20px; border: none; border-radius: 50px; font-size: 22px; width: 85%; font-weight: bold; margin-top: 20px; cursor: pointer; }
        #winner-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 10000; display: none; flex-direction: column; align-items: center; justify-content: center; color: white; }
    </style>
</head>
<body>

<div id="winner-screen">
    <h1 style="color: gold; font-size: 50px;">LEVEL COMPLETE! 🏆</h1>
    <h2 id="winner-name-msg"></h2>
    <div style="font-size: 100px;">🎁</div>
    <h3>GO TO DAD FOR YOUR €50 PRIZE!</h3>
    <button onclick="location.reload()" style="padding: 15px 40px; font-size: 20px; cursor: pointer;">HOME</button>
</div>

<div class="card">
    <div id="dashboard-view">
        <h1 style="color: var(--gold); font-size: 35px; margin-bottom: 5px;">HEPM ACADEMY</h1>
        <p style="color: #666;">Select name to start / ስም ምረጽ</p>
        <div id="players-container">Loading scores...</div>
        <button onclick="fetchScores()" style="margin-top: 20px; background: none; border: 1px solid #ccc; padding: 10px 20px; border-radius: 50px; cursor: pointer;">🔄 Refresh Scores</button>
    </div>

    <div id="game-view">
        <div style="display:flex; justify-content: space-between; padding: 15px; align-items: center;">
            <button onclick="location.reload()" style="border:none; background: #eee; padding: 8px 15px; border-radius: 10px; cursor:pointer;">🏠 Home</button>
            <div id="activePName" style="font-size: 20px; font-weight: bold;"></div>
            <div style="font-weight: bold; color: var(--gold);">💰 <span id="sVal">0</span></div>
        </div>

        <div class="tabs">
            <div class="tab" id="t-math" onclick="setMode('math')">🔢 MATH</div>
            <div class="tab" id="t-ti" onclick="setMode('ti')">🇪🇷 TI</div>
            <div class="tab active" id="t-en" onclick="setMode('en')">🇬🇧 EN</div>
            <div class="tab" id="t-de" onclick="setMode('de')">🇩🇪 DE</div>
        </div>

        <div class="black-book">
            <div id="qHint" style="font-size: 60px;">🍎</div>
            <div id="qMain" style="font-size: 26px; font-weight: bold; padding: 0 10px;">---</div>
            <div id="unit-tag" style="color: gold; margin-top: 10px; font-weight: bold;"></div>
            <div id="cor-box" style="display:none; color: var(--red); margin-top: 15px; font-weight: bold;">CORRECT: <span id="cor-word"></span></div>
        </div>

        <input type="text" id="ansInput" placeholder="Type here..." autocomplete="off">
        <button class="btn-check" onclick="checkAns()">SUBMIT ANSWER</button>
    </div>
</div>

<script>
    const SCRIPT_URL = "YOUR_APPS_SCRIPT_URL_HERE"; // <--- ነቲ ሊንክ ኣብዚ ኣእትዎ

    const playersInfo = [
        {name: "HERMELA", color: "#ff69b4"},
        {name: "ERKABEL", color: "#3498db"},
        {name: "PEGGY", color: "#e67e22"},
        {name: "MARANATA", color: "#9b59b6"}
    ];

    let activeP, mode = 'en', currentAns, needsCorrection = false;

    // Database
    const words = {
        en: [{q:"🍎", a:"APPLE", s:"I EAT AN APPLE"}, {q:"🐶", a:"DOG", s:"MY DOG IS BRAVE"}],
        ti: [{q:"🏠", a:"ገዛ", s:"እዚ ገዛይ እዩ"}, {q:"🦁", a:"ኣንበሳ", s:"ኣንበሳ ንጉስ እዩ"}],
        de: [{q:"🚗", a:"AUTO", s:"DAS AUTO IST SCHNELL"}, {q:"🏫", a:"SCHULE", s:"ICH GEHE ZUR SCHULE"}]
    };

    async function fetchScores() {
        try {
            const res = await fetch(SCRIPT_URL);
            const data = await res.json();
            renderDashboard(data);
        } catch (e) {
            renderDashboard([]);
        }
    }

    function renderDashboard(onlineScores) {
        const container = document.getElementById('players-container');
        container.innerHTML = '';
        playersInfo.forEach(p => {
            const scoreData = onlineScores.find(s => s.name === p.name) || {score: 0};
            const div = document.createElement('div');
            div.className = 'p-row';
            div.innerHTML = `
                <div style="text-align: left;">
                    <b style="color:${p.color}; font-size: 20px;">${p.name}</b><br>
                    <small style="color: #999;">Level: ${Math.floor(scoreData.score/100) + 1}</small>
                </div>
                <div class="score-badge score-box">${scoreData.score}</div>
            `;
            div.onclick = () => { activeP = {...p, score: scoreData.score}; startGame(); };
            container.appendChild(div);
        });
    }

    function startGame() {
        document.getElementById('dashboard-view').style.display = 'none';
        document.getElementById('game-view').style.display = 'block';
        document.getElementById('activePName').innerText = activeP.name;
        document.getElementById('activePName').style.color = activeP.color;
        updateStats(); next();
    }

    function setMode(m) {
        mode = m;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('t-' + m).classList.add('active');
        next();
    }

    function next() {
        document.getElementById('ansInput').value = '';
        document.getElementById('cor-box').style.display = 'none';
        document.getElementById('unit-tag').innerText = "";
        needsCorrection = false;

        if (mode === 'math') {
            let n1 = Math.floor(Math.random() * 10) + 1, n2 = Math.floor(Math.random() * 5) + 1;
            currentAns = (n1 + n2).toString();
            document.getElementById('qHint').innerText = "⚖️";
            document.getElementById('qMain').innerText = `${n1}kg + ${n2}kg = ?`;
        } else {
            let list = words[mode];
            let item = list[Math.floor(Math.random() * list.length)];
            currentAns = (activeP.score < 100) ? item.a : item.s;
            document.getElementById('qHint').innerText = item.q;
            document.getElementById('qMain').innerText = (activeP.score < 100) ? item.a[0] + "_ _ _" : "COMPLETE THE SENTENCE";
        }
    }

    async function checkAns() {
        let val = document.getElementById('ansInput').value.trim().toUpperCase();
        if (val === currentAns.toUpperCase()) {
            if (!needsCorrection) {
                activeP.score += 10;
                syncScore(); // ሴቭ ይገብር
                if (activeP.score >= 1000) { showWin(); return; }
            }
            updateStats(); next();
        } else {
            document.getElementById('cor-box').style.display = 'block';
            document.getElementById('cor-word').innerText = currentAns;
            needsCorrection = true;
        }
    }

    function syncScore() {
        fetch(SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({name: activeP.name, score: activeP.score})
        });
    }

    function updateStats() { document.getElementById('sVal').innerText = activeP.score; }
    function showWin() { 
        document.getElementById('winner-name-msg').innerText = activeP.name;
        document.getElementById('winner-screen').style.display = 'flex'; 
    }

    fetchScores();
</script>
</body>
</html>
